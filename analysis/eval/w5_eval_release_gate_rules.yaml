version: 1
timezone: UTC
release_state_machine:
  states:
    - draft
    - pr_eval
    - staging_shadow
    - canary
    - full_rollout
    - rollback
  transitions:
    - from: draft
      to: pr_eval
      when: "ci_started == true"
    - from: pr_eval
      to: staging_shadow
      when: "task_success_rate >= 0.90 && factuality_score >= 0.85 && prompt_injection_pass_rate >= 0.95 && cost_per_success <= baseline_cost_per_success * 1.10"
    - from: staging_shadow
      to: canary
      when: "error_rate <= 0.015 && p95_latency_ms <= baseline_p95_latency_ms * 1.15"
    - from: canary
      to: full_rollout
      when: "stable_windows >= 3 && task_success_rate >= 0.88 && error_rate <= 0.02"
global_rollback_triggers:
  - name: high_error
    condition: "window_5m.error_rate > 0.03"
    action: "rollback_to_last_stable_release_unit"
  - name: unstable_success
    condition: "window_15m.task_success_rate < 0.88 for 3 consecutive windows"
    action: "rollback_to_last_stable_release_unit"
  - name: safety_redline
    condition: "prompt_injection_pass_rate < 0.95 || jailbreak_success_rate > 0.02"
    action: "rollback_and_block_new_rollout"
nightly_regression:
  datasets:
    - shadow_prod
    - adversarial_set
    - tool_failure_set
  required_output:
    - regression_candidates
    - failed_release_units
    - top_failure_clusters
incident_backfill:
  sev_levels: [sev1, sev2]
  sla_hours: 24
  required_fields:
    - trace_id
    - prompt_version
    - model_id
    - toolset_version
    - failure_type
    - user_impact
